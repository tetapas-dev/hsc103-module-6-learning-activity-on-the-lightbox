<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>On the Lightbox — Exploring the Axial Skeleton</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal-50: #E1F5EE; --teal-100: #9FE1CB; --teal-600: #0F6E56; --teal-700: #085041; --teal-800: #085041;
    --blue-50: #E6F1FB; --blue-600: #185FA5; --blue-800: #0C447C;
    --coral-50: #FAECE7; --coral-600: #993C1D; --coral-800: #4A1B0C;
    --amber-50: #FAEEDA; --amber-600: #854F0B;
    --gray-50: #F1EFE8; --gray-100: #D3D1C7; --gray-200: #B4B2A9; --gray-600: #5F5E5A;
    --green-active: #1D9E75;
    --bg-primary: #ffffff; --bg-secondary: #f7f7f5; --bg-tertiary: #f0eeea;
    --text-primary: #1a1a18; --text-secondary: #5F5E5A; --text-hint: #888780;
    --border-light: rgba(0,0,0,0.10); --border-mid: rgba(0,0,0,0.18);
    --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px; --radius-xl: 16px;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  body { font-family: var(--font); background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; padding: 0; }

  .shell { max-width: 820px; margin: 0 auto; padding: 24px 16px 60px; }

  /* Header */
  .header { background: var(--bg-primary); border-radius: var(--radius-xl); border: 0.5px solid var(--border-light); padding: 20px 24px; margin-bottom: 20px; display: flex; align-items: center; gap: 16px; }
  .header-icon { width: 44px; height: 44px; background: var(--teal-50); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .header-title { font-size: 17px; font-weight: 600; color: var(--text-primary); }
  .header-sub { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
  .subject-tag { margin-left: auto; background: var(--teal-50); color: var(--teal-600); font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }

  /* Progress */
  .progress-wrap { background: var(--bg-primary); border-radius: var(--radius-lg); border: 0.5px solid var(--border-light); padding: 14px 20px; margin-bottom: 20px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
  .progress-dots { display: flex; gap: 5px; align-items: center; }
  .dot { height: 6px; flex: 1; border-radius: 3px; background: var(--gray-100); cursor: pointer; transition: background 0.25s; }
  .dot.active { background: var(--green-active); }
  .dot.done { background: var(--teal-100); }

  /* Slide */
  .slide { display: none; }
  .slide.visible { display: block; animation: slideIn 0.28s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .slide-header { margin-bottom: 18px; }
  .slo-badge { display: inline-block; background: var(--teal-50); color: var(--teal-600); font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; margin-bottom: 8px; letter-spacing: 0.04em; }
  .slide-title { font-size: 22px; font-weight: 700; color: var(--text-primary); line-height: 1.2; }
  .slide-sub { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }

  /* Cards */
  .card { background: var(--bg-primary); border-radius: var(--radius-lg); border: 0.5px solid var(--border-light); padding: 18px 20px; margin-bottom: 14px; }
  .card-accent { border-left: 3px solid var(--green-active); }

  /* Scene */
  .scene-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: var(--teal-600); text-transform: uppercase; margin-bottom: 6px; }
  .scene-text { font-size: 15px; line-height: 1.7; color: var(--text-primary); }

  /* Image placeholder */
  .img-placeholder { background: var(--gray-50); border: 1.5px dashed var(--gray-200); border-radius: var(--radius-md); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 20px; margin: 14px 0; min-height: 160px; }
  .img-placeholder svg { opacity: 0.4; }
  .img-placeholder-label { font-size: 12px; font-weight: 600; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.08em; }
  .img-placeholder-note { font-size: 11px; color: var(--text-hint); text-align: center; max-width: 280px; line-height: 1.5; }

  /* Two-col layout */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
  @media (max-width: 580px) { .two-col { grid-template-columns: 1fr; } }

  /* Question blocks */
  .q-block { background: var(--bg-primary); border-radius: var(--radius-lg); border: 0.5px solid var(--border-light); padding: 16px 18px; margin-bottom: 12px; }
  .q-num { font-size: 11px; font-weight: 700; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .q-text { font-size: 15px; color: var(--text-primary); line-height: 1.65; margin-bottom: 12px; }
  .options { display: flex; flex-direction: column; gap: 7px; }
  .opt-btn { background: var(--bg-secondary); border: 0.5px solid var(--border-light); border-radius: var(--radius-md); padding: 10px 14px; font-size: 14px; color: var(--text-primary); cursor: pointer; text-align: left; transition: all 0.15s; font-family: var(--font); line-height: 1.4; }
  .opt-btn:hover:not(:disabled) { border-color: var(--green-active); background: var(--teal-50); color: var(--teal-700); }
  .opt-btn.correct { background: var(--teal-50); border-color: var(--green-active); color: var(--teal-700); cursor: default; }
  .opt-btn.incorrect { background: var(--coral-50); border-color: var(--coral-600); color: var(--coral-800); cursor: default; }
  .opt-btn.neutral-off { opacity: 0.45; cursor: default; }
  .feedback { font-size: 13px; margin-top: 10px; padding: 10px 14px; border-radius: var(--radius-md); line-height: 1.55; }
  .feedback.correct { background: var(--teal-50); color: var(--teal-700); }
  .feedback.incorrect { background: var(--coral-50); color: var(--coral-800); }

  /* Sort */
  .word-bank { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 12px 16px; margin-bottom: 14px; }
  .wb-label { font-size: 11px; font-weight: 700; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { background: var(--bg-primary); border: 0.5px solid var(--border-mid); border-radius: 20px; padding: 5px 14px; font-size: 13px; color: var(--text-primary); cursor: pointer; transition: all 0.15s; }
  .chip:hover { border-color: var(--green-active); color: var(--teal-600); background: var(--teal-50); }
  .chip.selected { border-color: var(--green-active); background: var(--green-active); color: white; }
  .chip.placed-a { background: var(--teal-50); border-color: var(--green-active); color: var(--teal-700); cursor: default; }
  .chip.placed-b { background: var(--blue-50); border-color: var(--blue-600); color: var(--blue-800); cursor: default; }
  .chip.wrong { background: var(--coral-50); border-color: var(--coral-600); color: var(--coral-800); cursor: default; }
  .sort-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .sort-col { background: var(--bg-primary); border: 1px dashed var(--border-mid); border-radius: var(--radius-lg); padding: 14px; min-height: 100px; cursor: pointer; transition: border-color 0.15s; }
  .sort-col:hover { border-color: var(--green-active); }
  .sort-col-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .sort-col-title.a { color: var(--teal-600); }
  .sort-col-title.b { color: var(--blue-600); }

  /* True/False */
  .tf-row { display: flex; gap: 8px; margin-top: 10px; }
  .tf-btn { flex: 1; padding: 10px; border-radius: var(--radius-md); border: 0.5px solid var(--border-mid); background: var(--bg-secondary); font-size: 14px; cursor: pointer; color: var(--text-primary); font-weight: 500; transition: all 0.15s; font-family: var(--font); }
  .tf-btn:hover:not(:disabled) { border-color: var(--green-active); background: var(--teal-50); }
  .tf-btn.correct { background: var(--teal-50); border-color: var(--green-active); color: var(--teal-700); cursor: default; }
  .tf-btn.incorrect { background: var(--coral-50); border-color: var(--coral-600); color: var(--coral-800); cursor: default; }
  .tf-btn.neutral-off { opacity: 0.4; cursor: default; }

  /* Reflect */
  .reflect-q { font-size: 15px; color: var(--text-primary); line-height: 1.7; margin-bottom: 10px; }
  textarea { width: 100%; background: var(--bg-secondary); border: 0.5px solid var(--border-light); border-radius: var(--radius-md); padding: 10px 14px; font-size: 14px; color: var(--text-primary); font-family: var(--font); resize: vertical; min-height: 90px; line-height: 1.6; }
  textarea:focus { outline: none; border-color: var(--green-active); background: var(--bg-primary); }
  .hint-btn { background: transparent; border: 0.5px solid var(--border-mid); border-radius: var(--radius-md); padding: 6px 14px; font-size: 13px; color: var(--text-secondary); cursor: pointer; margin-top: 8px; font-family: var(--font); transition: all 0.15s; }
  .hint-btn:hover { background: var(--bg-secondary); }
  .hint-box { background: var(--teal-50); border-radius: var(--radius-md); padding: 10px 14px; font-size: 13px; color: var(--teal-700); margin-top: 8px; display: none; line-height: 1.6; }
  .hint-box.open { display: block; }

  /* SVG diagrams */
  .svg-wrap { background: var(--bg-primary); border-radius: var(--radius-lg); border: 0.5px solid var(--border-light); padding: 16px; margin: 14px 0; overflow: hidden; }
  .svg-caption { font-size: 12px; color: var(--text-hint); text-align: center; margin-top: 8px; font-style: italic; }

  /* Nav */
  .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; padding-top: 16px; border-top: 0.5px solid var(--border-light); }
  .nav-btn { background: var(--bg-primary); border: 0.5px solid var(--border-mid); border-radius: var(--radius-md); padding: 9px 20px; font-size: 14px; color: var(--text-primary); cursor: pointer; font-family: var(--font); transition: all 0.15s; }
  .nav-btn:hover:not(:disabled) { background: var(--bg-secondary); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn.primary { background: var(--green-active); border-color: var(--green-active); color: white; font-weight: 600; }
  .nav-btn.primary:hover { background: var(--teal-600); }

  /* Finish */
  .finish-card { text-align: center; padding: 40px 24px; }
  .finish-icon { font-size: 48px; margin-bottom: 16px; }
  .finish-title { font-size: 24px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
  .finish-text { font-size: 15px; color: var(--text-secondary); line-height: 1.7; max-width: 480px; margin: 0 auto; }
  .score-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 24px 0; }
  .score-cell { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 14px 10px; text-align: center; }
  .score-num { font-size: 28px; font-weight: 700; color: var(--green-active); }
  .score-lbl { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

  /* Info box */
  .info-box { background: var(--amber-50); border-radius: var(--radius-md); padding: 10px 14px; font-size: 13px; color: var(--amber-600); line-height: 1.6; margin-bottom: 12px; }

  /* Instruction text */
  .instruction { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 14px; }
</style>
</head>
<body>
<div class="shell">

  <div class="header">
    <div class="header-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M12 2C8.5 2 6 4.5 6 7c0 1.5.6 2.8 1.5 3.8L7 13h10l-.5-2.2C17.4 9.8 18 8.5 18 7c0-2.5-2.5-5-6-5z" fill="#1D9E75" opacity="0.3"/>
        <path d="M7 13l-1 5h12l-1-5H7z" fill="#1D9E75" opacity="0.5"/>
        <path d="M9 18v3M12 18v3M15 18v3" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="12" cy="7" r="2" fill="#1D9E75"/>
      </svg>
    </div>
    <div>
      <div class="header-title">On the Lightbox — Exploring the Axial Skeleton</div>
      <div class="header-sub">HSC103 Anatomy & Physiology 1 — Module 6 | Learning Activity 2</div>
    </div>
    <div class="subject-tag">Learning Activity 2</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span id="progressText">Slide 1 of 9</span>
      <span id="progressPct">0% complete</span>
    </div>
    <div class="progress-dots" id="progressDots"></div>
  </div>

  <div id="slideContainer"></div>

</div>

<script>
const slides = [
  { id:'scene', title:'The Skeleton in Action', sub:'Learning Activity 2 — Follow-up activity for Sections 5.2a & 5.2b, Marieb & Keller (2021)', type:'scene' },
  { id:'skull-mc', title:'Identify the Skull Bones', sub:'Recall — Section 5.2a', type:'mc',
    questions:[
      { q:'Which bone forms the forehead and the upper part of the eye sockets?', opts:['Parietal bone','Frontal bone','Temporal bone','Occipital bone'], correct:1, fb:'The frontal bone forms the forehead and the superior rim of the eye sockets — one of the most recognisable cranial bones.' },
      { q:'Which paired bones form the top and sides of the cranium?', opts:['Temporal bones','Zygomatic bones','Parietal bones','Nasal bones'], correct:2, fb:'The two parietal bones meet at the sagittal suture and form the roof and upper sides of the cranium.' },
      { q:'Which bone contains the foramen magnum, where the spinal cord exits the skull?', opts:['Sphenoid bone','Occipital bone','Ethmoid bone','Temporal bone'], correct:1, fb:'The occipital bone forms the back and base of the skull. The foramen magnum is a large opening through which the spinal cord passes.' }
    ]
  },
  { id:'sutures', title:'The Major Sutures', sub:'Understanding — Section 5.2a', type:'mc',
    questions:[
      { q:'Which suture connects the frontal bone to the two parietal bones?', opts:['Sagittal suture','Lambdoid suture','Coronal suture','Squamous suture'], correct:2, fb:'The coronal suture runs across the top of the skull connecting the frontal bone to the parietal bones — think of it as a "crown" across the head.' },
      { q:'The sagittal suture runs along the midline of the skull. Which two bones does it connect?', opts:['Frontal and occipital bones','Left and right parietal bones','Parietal and temporal bones','Occipital and parietal bones'], correct:1, fb:'The sagittal suture runs along the top of the skull from front to back, joining the two parietal bones along the midline.' },
      { q:'Sutures are immovable joints. Why does this make sense for the skull?', opts:['Because the skull is too heavy to support moveable joints','Because the skull\'s primary role is to protect the brain, requiring rigid stable connections','Because sutures allow for faster bone growth in children','Because moveable joints would require too many muscles to control'], correct:1, fb:'Structure always serves function. The brain requires a rigid protective case — moveable joints would compromise that protection. The skull trades mobility for maximum protection.' }
    ]
  },
  { id:'sort', title:'Sort the Skull', sub:'Classification — Section 5.2a', type:'sort',
    instruction:'Tap a bone from the word bank to select it, then click the column where it belongs.',
    items:[
      {name:'Frontal bone',cat:'A'},{name:'Parietal bone',cat:'A'},{name:'Occipital bone',cat:'A'},{name:'Temporal bone',cat:'A'},
      {name:'Mandible',cat:'B'},{name:'Maxilla',cat:'B'},{name:'Zygomatic bone',cat:'B'},{name:'Nasal bone',cat:'B'}
    ],
    colA:'Cranial bones', colB:'Facial bones',
    reflect:'What does the distinction between cranial and facial bones tell you about the two primary roles of the skull?',
    hint:'Think about protection vs. the role of the face in senses, eating, and expression. Each region has a different primary function — and bone placement reflects that.'
  },
  { id:'vertebra-mc', title:'Anatomy of a Vertebra', sub:'Application — Section 5.2b', type:'mc',
    questions:[
      { q:'Jordan\'s cervical X-ray is on the lightbox. Which feature is unique to cervical vertebrae and helps identify them immediately?', opts:['Large robust vertebral bodies','Transverse foramina in the transverse processes','Long downward-pointing spinous processes','Facets for rib articulation'], correct:1, fb:'Cervical vertebrae are the only vertebrae with transverse foramina — small openings through which the vertebral arteries pass up to the brain.' },
      { q:'Which region of the vertebral column has the largest and most robust vertebral bodies, and why?', opts:['Cervical — because they support the weight of the head','Thoracic — because they anchor the rib cage','Lumbar — because they bear the greatest body weight','Sacral — because they are fused together'], correct:2, fb:'Lumbar vertebrae bear the most weight — everything above presses down on this region. Their large vertebral bodies are a direct structural response to compressive load.' },
      { q:'The vertebral foramen forms a continuous canal down the length of the spine. What is its primary role?', opts:['To allow blood vessels to pass through the vertebral column','To reduce the overall weight of the vertebrae','To protect the spinal cord as it runs from the brain to the lower back','To provide attachment points for spinal muscles'], correct:2, fb:'The vertebral foramina stack to form the vertebral canal — a bony tunnel that protects the spinal cord along its entire length. Structure serving function at its clearest.' }
    ]
  },
  { id:'compare', title:'Compare the Vertebrae', sub:'Analysis — Section 5.2b', type:'reflect',
    qs:[
      { q:'Describe two structural features that distinguish a cervical vertebra from a lumbar vertebra.', hint:'Consider: size of the vertebral body, presence of transverse foramina, shape of the spinous process, and overall size. How does each difference reflect the different demands placed on each region?' },
      { q:'The radiologist points to a thoracic vertebra. What structural feature would confirm this identification, and what does it tell you about the function of the thoracic region?', hint:'Think about what the thoracic spine connects to — and how that connection is structurally expressed in the vertebra itself.' }
    ]
  },
  { id:'misconception', title:'Misconception Trap', sub:'Evaluation — Sections 5.2a & 5.2b', type:'tf',
    questions:[
      { q:'All vertebrae are identical in shape because they perform the same basic function.', correct:false, fb:'False. While all vertebrae share a basic structure, they differ significantly by region — cervical are small with transverse foramina, thoracic have rib facets, lumbar have large robust bodies. Form follows function.' },
      { q:'The sagittal suture connects the frontal bone to the parietal bones.', correct:false, fb:'False. The sagittal suture connects the two parietal bones along the midline. It is the coronal suture that connects the frontal bone to the parietal bones.' },
      { q:'The mandible is a facial bone because it forms part of the face and is involved in chewing and speech.', correct:true, fb:'True. The mandible (lower jaw) is a facial bone and the only moveable bone in the skull — essential for chewing, speech, and facial expression.' },
      { q:'Cervical vertebrae have the largest vertebral bodies because they sit at the top of the vertebral column.', correct:false, fb:'False. Cervical vertebrae have the smallest vertebral bodies. Lumbar vertebrae have the largest — they bear the greatest compressive load from body weight above.' }
    ]
  },
  { id:'synthesis', title:'Reflect and Connect', sub:'Synthesis — bringing it all together', type:'reflect',
    qs:[
      { q:'As a future health professional, your ability to explain the "why" behind the body\'s design is just as important as knowing the facts. In two or three sentences, explain to a fellow nursing student why the axial skeleton — specifically the skull and vertebral column — is so central to the body\'s ability to function. How does the structure of these bones reflect their protective and supportive roles?', hint:'Think beyond naming functions. How does the rigid nature of skull sutures serve the brain? How does the stacking of vertebral foramina protect the spinal cord? How does the increasing size of vertebral bodies from cervical to lumbar reflect load-bearing demands?' }
    ]
  },
  { id:'finish', title:'Activity complete', sub:'', type:'finish' }
];

let current = 0;
const mcState = {};
const tfState = {};
const sortState = {};

function renderProgress() {
  const dots = document.getElementById('progressDots');
  const txt = document.getElementById('progressText');
  const pct = document.getElementById('progressPct');
  const total = slides.length;
  dots.innerHTML = slides.map((s,i) =>
    `<div class="dot ${i===current?'active':i<current?'done':''}" onclick="goTo(${i})" title="${s.title}"></div>`
  ).join('');
  txt.textContent = `Slide ${current+1} of ${total}`;
  pct.textContent = Math.round((current/total)*100) + '% complete';
}

function goTo(i) { current = i; render(); }

function render() {
  renderProgress();
  const s = slides[current];
  const container = document.getElementById('slideContainer');
  let html = '';

  if (s.type === 'scene') {
    html = `
    <div class="slide visible">
      <div class="slide-header">
        <div class="slide-title">${s.title}</div>
        <div class="slide-sub">${s.sub}</div>
      </div>
      <div class="card card-accent">
        <div class="scene-label">Clinical Scene</div>
        <div class="scene-text">Jordan is a 19-year-old nursing student who plays recreational basketball on weekends. After a heavy training session, Jordan visits the radiology clinic for a routine check-up. The X-rays on the lightbox show the skull and vertebral column. <strong>As the healthcare student on placement, your job is to identify the structures, understand how they differ, and explain why their design makes sense.</strong></div>
      </div>
      ${skullSVG()}
      <div class="card" style="background:var(--bg-secondary);">
        <div style="font-size:13px;color:var(--text-secondary);line-height:1.7;">
          This activity follows your reading of <strong>Sections 5.2a and 5.2b</strong> from Marieb &amp; Keller (2021). Work through each of the <strong>9 slides</strong> — answer questions, classify bones, and reflect on what you've learned. Use the <em>Show guiding thought</em> buttons if you get stuck, but try answering first.
        </div>
      </div>
      ${navRow(true, false)}
    </div>`;

  } else if (s.type === 'mc') {
    if (!mcState[s.id]) mcState[s.id] = {};
    let qhtml = '';

    if (s.id === 'skull-mc') {
      qhtml += skullSVG();
      qhtml += `<div class="info-box">Use the skull diagram above to help orientate yourself as you answer the questions below.</div>`;
    }
    if (s.id === 'sutures') {
      qhtml += sutureSVG();
      qhtml += `<div class="info-box">Refer to the suture diagram above as you work through these questions.</div>`;
    }
    if (s.id === 'vertebra-mc') {
      qhtml += vertebraeSVG();
      qhtml += `<div class="info-box">Use the vertebrae comparison diagram above to support your answers.</div>`;
    }

    s.questions.forEach((q,qi) => {
      const st = mcState[s.id][qi];
      qhtml += `<div class="q-block"><div class="q-num">Question ${qi+1} of ${s.questions.length}</div><div class="q-text">${q.q}</div><div class="options">`;
      q.opts.forEach((opt,oi) => {
        let cls = 'opt-btn';
        if (st !== undefined) {
          if (oi === q.correct) cls += ' correct';
          else if (oi === st) cls += ' incorrect';
          else cls += ' neutral-off';
        }
        qhtml += `<button class="${cls}" onclick="answerMC('${s.id}',${qi},${oi},${q.correct})">${opt}</button>`;
      });
      qhtml += `</div>`;
      if (st !== undefined) {
        const ok = st === q.correct;
        qhtml += `<div class="feedback ${ok?'correct':'incorrect'}">${ok?'✓':'✗'} ${q.fb}</div>`;
      }
      qhtml += `</div>`;
    });

    html = `<div class="slide visible"><div class="slide-header">
      <div class="slide-title">${s.title}</div><div class="slide-sub">${s.sub}</div></div>
      ${qhtml}${navRow()}</div>`;

  } else if (s.type === 'sort') {
    if (!sortState[s.id]) sortState[s.id] = { placed:{}, selected:null };
    const st = sortState[s.id];
    const unplaced = s.items.filter(item => !st.placed[item.name]);
    const inA = s.items.filter(item => st.placed[item.name]==='A');
    const inB = s.items.filter(item => st.placed[item.name]==='B');
    const allDone = unplaced.length === 0;

    let sortHtml = `<div class="slide-header">
      <div class="slide-title">${s.title}</div><div class="slide-sub">${s.sub}</div></div>`;

    sortHtml += skullSVG();

    sortHtml += `<p class="instruction">${s.instruction}</p>`;
    if (unplaced.length > 0) {
      sortHtml += `<div class="word-bank"><div class="wb-label">Word bank — tap to select</div><div class="chips">`;
      unplaced.forEach(item => {
        const sel = st.selected === item.name;
        sortHtml += `<span class="chip${sel?' selected':''}" onclick="selectChip('${s.id}','${item.name}')">${item.name}</span>`;
      });
      sortHtml += `</div></div>`;
    }
    if (st.selected) {
      sortHtml += `<div class="info-box">Selected: <strong>${st.selected}</strong> — now click a column below to place it.</div>`;
    }
    sortHtml += `<div class="sort-cols">
      <div class="sort-col" onclick="placeChip('${s.id}','A')">
        <div class="sort-col-title a">${s.colA}</div><div class="chips">`;
    inA.forEach(item => {
      const ok = item.cat === 'A';
      sortHtml += `<span class="chip ${ok?'placed-a':'wrong'}">${item.name}</span>`;
    });
    sortHtml += `</div></div>
      <div class="sort-col" onclick="placeChip('${s.id}','B')">
        <div class="sort-col-title b">${s.colB}</div><div class="chips">`;
    inB.forEach(item => {
      const ok = item.cat === 'B';
      sortHtml += `<span class="chip ${ok?'placed-b':'wrong'}">${item.name}</span>`;
    });
    sortHtml += `</div></div></div>`;

    if (allDone) {
      const correct = s.items.filter(item => st.placed[item.name]===item.cat).length;
      sortHtml += `<div class="feedback ${correct===s.items.length?'correct':'incorrect'}" style="margin-bottom:12px;">${correct}/${s.items.length} correct. ${correct===s.items.length?'All bones correctly classified!':'Items shown in red are in the wrong category — review the skull diagram above.'}</div>`;
      sortHtml += `<div class="card"><div class="reflect-q"><strong>Reflect:</strong> ${s.reflect}</div>
        <button class="hint-btn" onclick="toggleHint('sort-hint')">Show guiding thought</button>
        <div class="hint-box" id="sort-hint">${s.hint}</div></div>`;
    }

    html = `<div class="slide visible">${sortHtml}${navRow()}</div>`;

  } else if (s.type === 'tf') {
    if (!tfState[s.id]) tfState[s.id] = {};
    let tfHtml = `<div class="slide-header">
      <div class="slide-title">${s.title}</div><div class="slide-sub">${s.sub}</div></div>
      <p class="instruction">Decide whether each statement is true or false. If false, the correct explanation will appear automatically.</p>`;

    tfHtml += sutureSVG();
    tfHtml += vertebraeSVG();
    tfHtml += `<div class="info-box">Refer to the diagrams above as you work through these statements.</div>`;

    s.questions.forEach((q,qi) => {
      const st = tfState[s.id][qi];
      tfHtml += `<div class="q-block"><div class="q-num">Statement ${qi+1} of ${s.questions.length}</div>
        <div class="q-text">${q.q}</div>`;
      if (st === undefined) {
        tfHtml += `<div class="tf-row">
          <button class="tf-btn" onclick="answerTF('${s.id}',${qi},true,${q.correct})">True</button>
          <button class="tf-btn" onclick="answerTF('${s.id}',${qi},false,${q.correct})">False</button>
        </div>`;
      } else {
        const ok = st === q.correct;
        tfHtml += `<div class="tf-row">
          <button class="tf-btn ${q.correct===true?'correct':st===true?'incorrect':'neutral-off'}" disabled>True</button>
          <button class="tf-btn ${q.correct===false?'correct':st===false?'incorrect':'neutral-off'}" disabled>False</button>
        </div><div class="feedback ${ok?'correct':'incorrect'}">${ok?'✓':'✗'} ${q.fb}</div>`;
      }
      tfHtml += `</div>`;
    });

    html = `<div class="slide visible">${tfHtml}${navRow()}</div>`;

    if (s.id === 'synthesis') {
      rHtml += `<div class="card" style="background:var(--bg-secondary)"><div style="font-size:13px;color:var(--text-secondary);line-height:1.7;">Your written responses won't be automatically marked — bring them to your next session to share and discuss with your facilitator and peers.</div></div>`;
    }

    html = `<div class="slide visible">${rHtml}${navRow()}</div>`;

  } else if (s.type === 'finish') {
    let mc = 0, mcTotal = 0, tf = 0, tfTotal = 0;
    slides.forEach(sl => {
      if (sl.type==='mc') { sl.questions.forEach((q,qi) => { mcTotal++; if (mcState[sl.id] && mcState[sl.id][qi]===q.correct) mc++; }); }
      if (sl.type==='tf') { sl.questions.forEach((q,qi) => { tfTotal++; if (tfState[sl.id] && tfState[sl.id][qi]===q.correct) tf++; }); }
    });
    html = `<div class="slide visible"><div class="card finish-card">
      <div class="finish-icon">🎉</div>
      <div class="finish-title">Activity complete!</div>
      <div class="finish-text">You've worked through all 9 slides covering the skull, sutures, and vertebral column. Bring your reflection responses to your next session.</div>
      <div class="score-grid">
        <div class="score-cell"><div class="score-num">${mc}/${mcTotal}</div><div class="score-lbl">Multiple choice</div></div>
        <div class="score-cell"><div class="score-num">${tf}/${tfTotal}</div><div class="score-lbl">True / False</div></div>
        <div class="score-cell"><div class="score-num">✓</div><div class="score-lbl">Reflections written</div></div>
      </div>
      <button class="nav-btn primary" onclick="goTo(0)" style="margin-top:8px;">Start again</button>
    </div></div>`;
  }

  container.innerHTML = html;
  window.scrollTo({top:0,behavior:'smooth'});
}

function navRow(hideBack=false, hideFwd=false) {
  const isLast = current === slides.length - 1;
  return `<div class="nav-row">
    <button class="nav-btn" onclick="navigate(-1)" ${current===0||hideBack?'disabled':''}>← Previous</button>
    <button class="nav-btn primary" onclick="navigate(1)" ${hideFwd?'disabled':''}>${isLast?'Finish ✓':'Next →'}</button>
  </div>`;
}

function navigate(dir) {
  const n = current + dir;
  if (n >= 0 && n < slides.length) { current = n; render(); }
}

function answerMC(id,qi,chosen,correct) {
  if (!mcState[id]) mcState[id]={};
  if (mcState[id][qi]!==undefined) return;
  mcState[id][qi]=chosen; render();
}

function answerTF(id,qi,chosen,correct) {
  if (!tfState[id]) tfState[id]={};
  if (tfState[id][qi]!==undefined) return;
  tfState[id][qi]=chosen; render();
}

function selectChip(id,name) {
  if (!sortState[id]) sortState[id]={placed:{},selected:null};
  sortState[id].selected = sortState[id].selected===name ? null : name;
  render();
}

function placeChip(id,col) {
  if (!sortState[id] || !sortState[id].selected) return;
  sortState[id].placed[sortState[id].selected]=col;
  sortState[id].selected=null;
  render();
}

function toggleHint(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function copyNotes(taId, btn) {
  const ta = document.getElementById(taId);
  if (!ta || !ta.value.trim()) { btn.textContent = '⚠ Nothing to copy'; setTimeout(()=>btn.textContent='📋 Copy notes',1500); return; }
  navigator.clipboard.writeText(ta.value).then(()=>{
    btn.textContent = '✓ Copied!';
    setTimeout(()=>btn.textContent='📋 Copy notes',2000);
  }).catch(()=>{
    ta.select();
    document.execCommand('copy');
    btn.textContent = '✓ Copied!';
    setTimeout(()=>btn.textContent='📋 Copy notes',2000);
  });
}
